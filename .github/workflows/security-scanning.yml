name: Security Scanning

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: '0 2 * * 0'

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sast-scan:
    name: SAST Scanning (Snyk)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Run Snyk Code scan
        uses: snyk/actions/node@b98d498629f1c5e001c83c1c765c35173f58905 # v0.4.0
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --all-projects

      - name: Upload Snyk results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@1b1aada464948af03b950b1073b8ee5becc10c3c # v3.24.9
        with:
          sarif_file: snyk.sarif
          category: snyk
        continue-on-error: true

  dependency-check:
    name: Dependency Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: npm-audit
        run: |
          npm audit --audit-level=high --json > audit.json 2>&1 || true
          cat audit.json

      - name: Parse npm audit results
        if: always()
        run: |
          node -e "
          const audit = require('./audit.json');
          const vulns = audit.vulnerabilities || {};
          const critical = Object.values(vulns).filter(v => v.severity === 'critical').length;
          const high = Object.values(vulns).filter(v => v.severity === 'high').length;
          console.log(\`Found: \${critical} critical, \${high} high\`);
          if (critical > 0) {
            console.error('CRITICAL vulnerabilities found!');
            process.exit(1);
          }
          "

      - name: Upload npm audit report
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: npm-audit-report
          path: audit.json
          retention-days: 30

      - name: Check license compliance
        run: |
          npx license-checker --production --excludePrivatePackages \
            --onlyAllow "MIT;Apache-2.0;BSD-2-Clause;BSD-3-Clause;ISC;0BSD;CC0-1.0;Unlicense" \
            --csv --out licenses.csv
        continue-on-error: true

      - name: Upload license report
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: license-report
          path: licenses.csv
          retention-days: 30

  container-scan:
    name: Container Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    strategy:
      matrix:
        image: [api, web, stellar-service]

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0

      - name: Build Docker image
        uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6e38e18a0f42fcba # v5.10.0
        with:
          context: ./apps/${{ matrix.image }}
          push: false
          load: true
          tags: health-watchers-${{ matrix.image }}:scan

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@7c80399a1ee0be289fb811580e8ecf039cb16d5a # v0.24.0
        with:
          image-ref: health-watchers-${{ matrix.image }}:scan
          format: sarif
          output: trivy-${{ matrix.image }}.sarif
          severity: HIGH,CRITICAL

      - name: Upload Trivy results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@1b1aada464948af03b950b1073b8ee5becc10c3c # v3.24.9
        with:
          sarif_file: trivy-${{ matrix.image }}.sarif
          category: trivy-${{ matrix.image }}
        continue-on-error: true

      - name: Generate Trivy report
        if: always()
        uses: aquasecurity/trivy-action@7c80399a1ee0be289fb811580e8ecf039cb16d5a # v0.24.0
        with:
          image-ref: health-watchers-${{ matrix.image }}:scan
          format: json
          output: trivy-${{ matrix.image }}-report.json

      - name: Upload Trivy report
        if: always()
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: trivy-report-${{ matrix.image }}
          path: trivy-${{ matrix.image }}-report.json
          retention-days: 30

  remediation-tracking:
    name: Remediation Tracking
    runs-on: ubuntu-latest
    needs: [sast-scan, dependency-check, container-scan]
    if: always()
    permissions:
      contents: read
      issues: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Download security reports
        uses: actions/download-artifact@fa0a91b85d4f404e444306234f26e4f1c1fb8bcd # v4.1.8
        with:
          path: security-reports

      - name: Generate remediation summary
        id: remediation
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Scan Results" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "security-reports/npm-audit-report/audit.json" ]; then
            echo "✓ Dependency Check: Completed" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -f "security-reports/license-report/licenses.csv" ]; then
            echo "✓ License Check: Completed" >> $GITHUB_STEP_SUMMARY
          fi
          
          for report in security-reports/trivy-report-*/trivy-*-report.json; do
            if [ -f "$report" ]; then
              echo "✓ Container Scan: Completed" >> $GITHUB_STEP_SUMMARY
              break
            fi
          done

      - name: Create remediation issue if vulnerabilities found
        if: failure()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '[Security] Vulnerabilities Found in Scan',
              body: 'Security scanning detected vulnerabilities. Review reports in the artifacts.',
              labels: ['security', 'automated'],
            });
            console.log(`Created issue #${issue.data.number}`);
        continue-on-error: true
